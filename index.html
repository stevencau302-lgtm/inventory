<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InventoryPro - Modern Inventory Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { 50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81' },
                        surface: { 50:'#f8fafc',100:'#f1f5f9',200:'#e2e8f0',800:'#1e293b',900:'#0f172a',950:'#020617' }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-surface-950 text-white font-sans antialiased">
    <div id="app" class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar-container">
            <div class="p-6 border-b border-white/5">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-brand-500 to-brand-700 flex items-center justify-center shadow-lg shadow-brand-500/25">
                        <i class="fas fa-cube text-white text-lg"></i>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold text-white">Inventory<span class="text-brand-400">Pro</span></h1>
                        <p class="text-xs text-slate-500">Management System</p>
                    </div>
                </div>
            </div>
            <nav class="flex-1 p-4 space-y-1">
                <a href="#" class="nav-link active" data-page="dashboard">
                    <i class="fas fa-chart-pie w-5"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-link" data-page="products">
                    <i class="fas fa-box w-5"></i>
                    <span>Produk</span>
                </a>
                <a href="#" class="nav-link" data-page="categories">
                    <i class="fas fa-tags w-5"></i>
                    <span>Kategori</span>
                </a>
                <a href="#" class="nav-link" data-page="reports">
                    <i class="fas fa-chart-bar w-5"></i>
                    <span>Laporan</span>
                </a>
                <a href="#" class="nav-link" data-page="settings">
                    <i class="fas fa-gear w-5"></i>
                    <span>Pengaturan</span>
                </a>
            </nav>
            <div class="p-4 border-t border-white/5">
                <div class="flex items-center gap-3 px-3 py-2">
                    <div class="w-9 h-9 rounded-full bg-gradient-to-br from-brand-400 to-purple-600 flex items-center justify-center text-sm font-bold">A</div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-medium text-white truncate">Admin</p>
                        <p class="text-xs text-slate-500">admin@inventory.pro</p>
                    </div>
                    <button class="text-slate-500 hover:text-white transition"><i class="fas fa-ellipsis-vertical"></i></button>
                </div>
            </div>
        </aside>

        <!-- Main -->
        <main class="flex-1 flex flex-col overflow-hidden">
            <!-- Top Bar -->
            <header class="h-16 border-b border-white/5 bg-surface-900/50 backdrop-blur-xl flex items-center justify-between px-6 shrink-0">
                <div class="flex items-center gap-4">
                    <button id="mobileMenuBtn" class="lg:hidden text-slate-400 hover:text-white">
                        <i class="fas fa-bars text-xl"></i>
                    </button>
                    <div class="relative">
                        <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                        <input id="searchInput" type="text" placeholder="Cari produk..." class="w-64 bg-surface-800 border border-white/5 rounded-lg pl-10 pr-4 py-2 text-sm text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 transition">
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <button class="relative w-9 h-9 rounded-lg bg-surface-800 border border-white/5 flex items-center justify-center text-slate-400 hover:text-white hover:bg-surface-700 transition">
                        <i class="fas fa-bell text-sm"></i>
                        <span class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 rounded-full text-[10px] font-bold flex items-center justify-center">3</span>
                    </button>
                    <button id="themeBtn" class="w-9 h-9 rounded-lg bg-surface-800 border border-white/5 flex items-center justify-center text-slate-400 hover:text-white hover:bg-surface-700 transition">
                        <i class="fas fa-sun text-sm"></i>
                    </button>
                </div>
            </header>

            <!-- Content -->
            <div class="flex-1 overflow-y-auto p-6" id="content">
                <!-- Pages rendered here by JS -->
            </div>
        </main>
    </div>

    <!-- Product Modal -->
    <div id="productModal" class="modal-overlay hidden">
        <div class="modal-container">
            <div class="flex items-center justify-between p-6 border-b border-white/5">
                <h2 id="modalTitle" class="text-xl font-bold">Tambah Produk</h2>
                <button id="closeModalBtn" class="w-8 h-8 rounded-lg bg-surface-800 flex items-center justify-center text-slate-400 hover:text-white hover:bg-red-500/20 hover:text-red-400 transition">
                    <i class="fas fa-xmark"></i>
                </button>
            </div>
            <form id="productForm" class="p-6 space-y-4">
                <input type="hidden" id="productId">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="text-xs font-medium text-slate-400 uppercase tracking-wider">Nama Produk</label>
                        <input type="text" id="productName" required class="form-input" placeholder="Masukkan nama produk">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-medium text-slate-400 uppercase tracking-wider">SKU</label>
                        <input type="text" id="productSku" required class="form-input" placeholder="SKU-001">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-medium text-slate-400 uppercase tracking-wider">Kategori</label>
                        <select id="productCategory" required class="form-input"><option value="">Pilih Kategori</option></select>
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-medium text-slate-400 uppercase tracking-wider">Stok</label>
                        <input type="number" id="productStock" required min="0" class="form-input" placeholder="0">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-medium text-slate-400 uppercase tracking-wider">Harga (Rp)</label>
                        <input type="number" id="productPrice" required min="0" class="form-input" placeholder="0">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-medium text-slate-400 uppercase tracking-wider">Min. Stok</label>
                        <input type="number" id="productMinStock" required min="0" class="form-input" placeholder="10">
                    </div>
                </div>
                <div class="space-y-1.5">
                    <label class="text-xs font-medium text-slate-400 uppercase tracking-wider">Deskripsi</label>
                    <textarea id="productDescription" rows="3" class="form-input" placeholder="Deskripsi produk..."></textarea>
                </div>
                <div class="flex justify-end gap-3 pt-4 border-t border-white/5">
                    <button type="button" id="cancelModalBtn" class="px-4 py-2 rounded-lg border border-white/10 text-sm font-medium text-slate-300 hover:bg-surface-700 transition">Batal</button>
                    <button type="submit" class="px-5 py-2 rounded-lg bg-gradient-to-r from-brand-500 to-brand-600 text-sm font-medium text-white hover:from-brand-600 hover:to-brand-700 shadow-lg shadow-brand-500/25 transition">
                        <i class="fas fa-save mr-2"></i>Simpan
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Category Modal -->
    <div id="categoryModal" class="modal-overlay hidden">
        <div class="modal-container max-w-md">
            <div class="flex items-center justify-between p-6 border-b border-white/5">
                <h2 class="text-xl font-bold">Tambah Kategori</h2>
                <button id="closeCatModalBtn" class="w-8 h-8 rounded-lg bg-surface-800 flex items-center justify-center text-slate-400 hover:text-red-400 transition">
                    <i class="fas fa-xmark"></i>
                </button>
            </div>
            <form id="categoryForm" class="p-6 space-y-4">
                <div class="space-y-1.5">
                    <label class="text-xs font-medium text-slate-400 uppercase tracking-wider">Nama Kategori</label>
                    <input type="text" id="categoryName" required class="form-input" placeholder="Nama kategori">
                </div>
                <div class="space-y-1.5">
                    <label class="text-xs font-medium text-slate-400 uppercase tracking-wider">Icon (FA class)</label>
                    <input type="text" id="categoryIcon" class="form-input" value="fas fa-tag" placeholder="fas fa-laptop">
                </div>
                <div class="space-y-1.5">
                    <label class="text-xs font-medium text-slate-400 uppercase tracking-wider">Warna</label>
                    <input type="color" id="categoryColor" value="#6366f1" class="w-full h-10 rounded-lg border border-white/10 bg-surface-800 cursor-pointer">
                </div>
                <div class="flex justify-end gap-3 pt-4 border-t border-white/5">
                    <button type="button" id="cancelCatBtn" class="px-4 py-2 rounded-lg border border-white/10 text-sm font-medium text-slate-300 hover:bg-surface-700 transition">Batal</button>
                    <button type="submit" class="px-5 py-2 rounded-lg bg-gradient-to-r from-brand-500 to-brand-600 text-sm font-medium text-white shadow-lg shadow-brand-500/25 transition">
                        <i class="fas fa-save mr-2"></i>Simpan
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="fixed top-4 right-4 z-[9999] space-y-3"></div>

    <script src="app.js"></script>
</body>
</html>
